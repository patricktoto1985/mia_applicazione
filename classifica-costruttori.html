<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Costruttori | GRCCF1ESPORT</title>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0f19;
            --card-bg: #131a26;
            --accent-cyan: #00ffd1;
            --text-light: #ffffff;
            --text-muted: #8fa0b5;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 800px; margin: 10px auto; }
        .back-btn {
            display: inline-block;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .back-btn:hover { background-color: var(--accent-cyan); color: #000; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #1f2c3f; }
        h2 { color: var(--f1-red); margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #1f2c3f; padding-bottom: 10px; margin-bottom: 5px; }
        .status-text { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 400px; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #1f2c3f; }
        th { color: var(--accent-cyan); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        tr:hover { background-color: rgba(255,255,255,0.01); }
        
        .team-name { font-weight: bold; font-size: 1rem; padding-left: 8px; }
        .team-cell { white-space: nowrap; }
        
        /* Colori muretti scuderie */
        .ferrari { border-left: 4px solid #e10600; }
        .audi { border-left: 4px solid #f5f5f5; }
        .cadillac { border-left: 4px solid #555555; }
        .mclaren { border-left: 4px solid #ff8700; }
        .mercedes { border-left: 4px solid #00a19c; }
        .redbull { border-left: 4px solid #0c1e43; }
        .aston { border-left: 4px solid #006643; }
        .alpine { border-left: 4px solid #0078c1; }
        .williams { border-left: 4px solid #005aff; }
        .haas { border-left: 4px solid #e60000; }
        .rb { border-left: 4px solid #6699ff; }
        
        .punti { font-weight: bold; color: var(--text-muted); font-size: 1.1rem; text-align: center; }
        .th-punti { text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ Torna al Race Control</a>

        <div class="card">
            <h2>Classifica Mondiale Costruttori</h2>
            <div class="status-text">GRCCF1ESPORT -Stagione 2026 — Punteggio Team</div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Scuderia</th>
                            <th class="th-punti" style="width: 20%">Punti</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="team-cell"><span class="team-name alpine">Alpine F1 Team</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name aston">Aston Martin</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name audi">Audi Sport</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name cadillac">Cadillac Racing</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name ferrari">Ferrari HP</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name haas">Haas F1 Team</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name mclaren">McLaren F1 Team</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name mercedes">Mercedes-AMG</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name rb">Racing Bulls</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name redbull">Red Bull Racing</span></td>
                            <td class="punti">0</td>
                        </tr>
                        <tr>
                            <td class="team-cell"><span class="team-name williams">Williams Racing</span></td>
                            <td class="punti">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
