<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica Costruttori 2025 | GRCCF1ESPORT</title>
    <style>
        :root { --f1-red: #e10600; --dark-bg: #0b0f19; --card-bg: #131a26; --accent-cyan: #00ffd1; --text-light: #ffffff; --text-muted: #8fa0b5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: var(--text-light); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 10px auto; }
        .back-btn { display: inline-block; color: var(--accent-cyan); text-decoration: none; font-weight: bold; margin-bottom: 20px; border: 1px solid var(--accent-cyan); padding: 8px 16px; border-radius: 8px; transition: 0.2s; }
        .back-btn:hover { background-color: var(--accent-cyan); color: #000; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #1f2c3f; }
        h2 { color: var(--f1-red); margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #1f2c3f; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #1f2c3f; }
        th { color: var(--accent-cyan); text-transform: uppercase; }
        .pos { font-weight: bold; color: #ffb700; width: 60px; }
        .points { font-weight: bold; color: var(--accent-cyan); text-align: right; }
        th.text-right { text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <a href="campionati.html" class="back-btn">⬅ Torna a Seleziona Stagione</a>
        <div class="card">
            <h2>Classifica Finale Costruttori — Stagione 2025</h2>
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Scuderia</th>
                        <th class="text-right">Punti</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td class="pos">1</td><td>🔴 Ferrari</td><td class="points">726</td></tr>
                    <tr><td class="pos">2</td><td>⚪ Haas</td><td class="points">599</td></tr>
                    <tr><td class="pos">3</td><td>🧡 McLaren</td><td class="points">381</td></tr>
                    <tr><td class="pos">4</td><td>💚 Mercedes</td><td class="points">363</td></tr>
                    <tr><td class="pos">5</td><td>🔵 Racing Bulls</td><td class="points">333</td></tr>
                    <tr><td class="pos">6</td><td>🔵 Red Bull</td><td class="points">312</td></tr>
                    <tr><td class="pos">7</td><td>🟢 Aston Martin</td><td class="points">267</td></tr>
                    <tr><td class="pos">8</td><td>🔵 Alpine</td><td class="points">205</td></tr>
                    <tr><td class="pos">9</td><td>🟢 Sauber</td><td class="points">203</td></tr>
                    <tr><td class="pos">10</td><td>🔵 Williams</td><td class="points">118</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
