<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlights Gare | GRCCF1ESPORTS</title>
    
    <script>
        // Controllo di sicurezza iniziale
        if (sessionStorage.getItem('grcc_authenticated') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0f19;
            --card-bg: #131722;
            --accent-cyan: #00ffd1;
            --text-light: #ffffff;
            --text-muted: #8fa0b5;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
        }
        .container { max-width: 800px; margin: 10px auto; }
        .back-btn {
            display: inline-block;
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid var(--accent-cyan);
            padding: 8px 15px;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h2 { color: var(--f1-red); margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--text-muted); }
        select, input, button.submit-btn {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #1a1f2c;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        select:focus, input:focus { border-color: var(--accent-cyan); outline: none; }
        button.submit-btn {
            background: var(--f1-red);
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button.submit-btn:hover { background: #b80500; }
        .video-list { margin-top: 25px; }
        .video-item {
            background: #1a1f2c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid var(--f1-red);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .video-link { color: var(--accent-cyan); text-decoration: none; font-weight: bold; }
        .video-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← Torna al Race Control</a>

        <div class="card">
            <h2>🎬 Condividi i tuoi Highlights</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Incolla il link del tuo video (YouTube, Twitch clip, TikTok o OneDrive/Drive) per mostrarlo alla community.</p>
            
            <form id="highlightForm" onsubmit="salvaVideo(event)">
                <label for="selectRound">Seleziona il GP / Round:</label>
                <select id="selectRound" onchange="mostraVideoCaricati()" required>
                    <option value="R1">Round 1 - Australia</option>
                    <option value="R2">Round 2 - Cina</option>
                    <option value="R3">Round 3 - Giappone</option>
                    <option value="R4">Round 4 - Bahrain</option>
                    <option value="R5">Round 5 - Arabia Saudita</option>
                    <option value="R6">Round 6 - Miami</option>
                    <option value="R7">Round 7 - Canada</option>
                    <option value="R8">Round 8 - Monaco</option>
                    <option value="R9">Round 9 - Barcellona</option>
                    <option value="R10">Round 10 - Austria</option>
                    <option value="R11">Round 11 - Gran Bretagna</option>
                    <option value="R12">Round 12 - Belgio</option>
                    <option value="R13">Round 13 - Ungheria</option>
                    <option value="R14">Round 14 - Olanda</option>
                    <option value="R15">Round 15 - Italia</option>
                    <option value="R16">Round 16 - Spagna</option>
                    <option value="R17">Round 17 - Azerbaijan</option>
                    <option value="R18">Round 18 - Singapore</option>
                    <option value="R19">Round 19 - Stati Uniti</option>
                    <option value="R20">Round 20 - Messico</option>
                    <option value="R21">Round 21 - San Paolo</option>
                    <option value="R22">Round 22 - Las Vegas</option>
                    <option value="R23">Round 23 - Qatar</option>
                    <option value="R24">Round 24 - Abu Dhabi</option>
                </select>

                <label for="pilotName">Il tuo Nome / Gamertag:</label>
                <input type="text" id="pilotName" placeholder="Es. Nome Pilota" required>

                <label for="videoUrl">Link del Video / Clip:</label>
                <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>

                <button type="submit" class="submit-btn">Pubblica Highlight 🚀</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">📺 Video pubblicati per questo Round</h3>
            <div id="listaVideo" class="video-list">
                </div>
        </div>
    </div>

    <script>
        // Carica i video del primo round all'avvio della pagina
        window.onload = function() {
            mostraVideoCaricati();
        };

        // Funzione per salvare il video nel localStorage
        function salvaVideo(event) {
            event.preventDefault();

            const round = document.getElementById('selectRound').value;
            const nome = document.getElementById('pilotName').value;
            const url = document.getElementById('videoUrl').value;

            // Recupera la lista video esistente per quel round o ne crea una nuova
            let videoSalvati = JSON.parse(localStorage.getItem(`highlights-${round}`)) || [];

            // Aggiunge il nuovo video all'elenco
            videoSalvati.push({ pilota: nome, link: url });

            // Salva nuovamente nel localStorage
            localStorage.setItem(`highlights-${round}`, JSON.stringify(videoSalvati));

            // Resetta i campi di testo
            document.getElementById('pilotName').value = '';
            document.getElementById('videoUrl').value = '';

            alert('✅ Video aggiunto con successo agli highlights!');
            mostraVideoCaricati();
        }

        // Funzione per stampare a schermo i video filtrati per il round selezionato
        function mostraVideoCaricati() {
            const round = document.getElementById('selectRound').value;
            const contenitore = document.getElementById('listaVideo');
            contenitore.innerHTML = ''; // Svuota la lista precedente

            let videoSalvati = JSON.parse(localStorage.getItem(`highlights-${round}`)) || [];

            if (videoSalvati.length === 0) {
                contenitore.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">Nessun highlight caricato per questo round.</p>';
                return;
            }

            videoSalvati.forEach(video => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.innerHTML = `
                    <div>
                        <strong style="color: #fff;">${video.pilota}</strong>
                    </div>
                    <a href="${video.link}" target="_blank" class="video-link">Guarda Video 🎥</a>
                `;
                contenitore.innerHTML += item.outerHTML;
            });
        }
    </script>
</body>
</html>
